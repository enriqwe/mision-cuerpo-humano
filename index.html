*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(135deg,#e9fbff,#f6f1ff 55%,#fff7de);min-height:100vh}button{font:inherit;border:0;border-radius:16px;padding:12px 18px;cursor:pointer;font-weight:900;transition:.16s;box-shadow:0 8px 0 rgba(0,0,0,.12)}button:hover{transform:translateY(-2px)}button:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.12)}.app{max-width:1160px;margin:auto;padding:22px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.logo{width:58px;height:58px;border-radius:20px;background:#fff;display:grid;place-items:center;font-size:34px;box-shadow:var(--shadow)}h1{margin:0;font-size:clamp(28px,5vw,52px);line-height:1}.subtitle{color:var(--muted);font-weight:800;margin-top:5px}.pill{background:#fff;border:3px solid #d7ecff;border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:var(--shadow);white-space:nowrap}.screen{display:none}.screen.active{display:block}.card{background:rgba(255,255,255,.94);border:4px solid #fff;border-radius:28px;box-shadow:var(--shadow);padding:24px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:center}.hero h2{font-size:clamp(30px,5vw,58px);margin:0 0 10px}.hero p{font-size:20px;color:#475569;line-height:1.45}.guide{background:linear-gradient(180deg,#fff,#e8f7ff);border-radius:28px;padding:18px;text-align:center;border:4px dashed #b9e2ff}.guide .face{font-size:110px;filter:drop-shadow(0 8px 0 rgba(0,0,0,.08))}.speech{background:#fff;border-radius:20px;padding:14px;font-weight:900;margin-top:10px}.row{display:flex;flex-wrap:wrap;gap:12px}.primary{background:var(--blue);color:#fff}.secondary{background:var(--yellow);color:#3b2f00}.good{background:var(--green);color:#fff}.purple{background:var(--purple);color:#fff}.plain{background:#eef6ff;color:#24415f;box-shadow:none;border:2px solid #d8ebff}.levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}.level{padding:20px;border-radius:24px;background:#fff;border:4px solid #e6f3ff;box-shadow:var(--shadow);cursor:pointer}.level:hover{transform:translateY(-3px)}.level h3{margin:0 0 8px;font-size:23px}.level .badge{font-size:34px}.stars{font-size:24px;color:#f6b800;letter-spacing:2px}.gameGrid{display:grid;grid-template-columns:320px 1fr;gap:18px}.hud{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.hud .pill{box-shadow:none}.stage{min-height:500px;position:relative;overflow:hidden}.question{font-size:25px;font-weight:950;margin:0 0 14px}.hint{min-height:32px;color:#b45309;font-weight:900;margin-top:10px}.feedback{font-size:22px;font-weight:1000;margin:12px 0}.ok{color:var(--green)}.bad{color:var(--red)}.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.option{background:#fff;border:3px solid #d7eaff;box-shadow:0 6px 0 #c7dbef}.option.correct{background:#dff8e8;border-color:#7bd69b}.option.wrong{background:#ffe2e2;border-color:#ff9d9d}.bodyWrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}.bodySvg{width:100%;max-width:360px;margin:auto;display:block}.drop{fill:#f8fbff;stroke:#8fc5ef;stroke-width:3;stroke-dasharray:6 5}.targetLabel{font-weight:900;font-size:18px;fill:#31546f}.dragPanel{display:grid;gap:10px}.dragItem{background:#fff;border:3px solid #d7eaff;border-radius:18px;padding:12px;font-weight:900;cursor:pointer;text-align:center;box-shadow:0 6px 0 #c7dbef}.dragItem.selected{background:#fff4c7;border-color:#f2c94c;transform:translateY(2px);box-shadow:0 3px 0 #d9b344}.dragItem.used{opacity:.35;pointer-events:none}.dropZone{cursor:pointer}.dropZone.done .drop{fill:#dcfce7;stroke:#62c984;stroke-dasharray:0}.muscleMap{display:grid;grid-template-columns:1fr 1fr;gap:14px}.hotspot{cursor:pointer}.hotspot:hover{filter:brightness(1.12)}.legend{display:grid;gap:8px}.legend div{padding:10px;border-radius:14px;background:#f8fbff;font-weight:900}.timer{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden}.timer span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#27ae60,#f2c94c,#eb5757);transition:width .2s linear}.stickers{display:flex;gap:10px;flex-wrap:wrap}.sticker{font-size:42px;background:#fff;border-radius:18px;padding:8px 12px;box-shadow:0 8px 0 rgba(0,0,0,.1)}.dict{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.dict article{background:#fff;border:3px solid #e1efff;border-radius:20px;padding:14px}.dict h4{margin:0 0 6px;color:#1d4ed8}.small{font-size:14px;color:#64748b}.hidden{display:none!important}@media(max-width:800px){.hero,.gameGrid,.bodyWrap,.muscleMap{grid-template-columns:1fr}.topbar{align-items:flex-start}.stage{min-height:auto}.guide .face{font-size:82px}}

<body><div class="app">
<header class="topbar"><div class="brand"><div class="logo">🦴</div><div><h1 id="title">Misión Cuerpo Humano</h1><div class="subtitle" id="subtitle">Science: huesos, músculos y movimiento</div></div></div><div class="pill" id="totalScore">⭐ 0 puntos</div></header>
<main id="language" class="screen active"><section class="card hero"><div><h2>Elige idioma / Choose language</h2><p>Un solo juego, dos versiones para practicar Science en español o en inglés.</p><div class="row"><button class="primary" onclick="setLang('es')">🇪🇸 Español</button><button class="good" onclick="setLang('en')">🇬🇧 English</button></div></div><div class="guide"><div class="face">👩‍🔬</div><div class="speech">¡Vamos! / Let’s go!</div></div></section></main>

<main id="game" class="screen"><div class="gameGrid"><aside class="card"><div class="guide"><div class="face" style="font-size:76px">💀</div><div class="speech" id="guideText"></div></div><div style="height:14px"></div><div class="hud"><div class="pill" id="levelName"></div><div class="pill" id="score"></div><div class="pill" id="step"></div></div><div id="timerBox" class="hidden"><div class="small" id="timeLabel"></div><div class="timer"><span id="timerBar"></span></div></div><div class="feedback" id="feedback"></div><div class="hint" id="hint"></div><div class="row"><button class="plain" onclick="showScreen('levels')" id="exitBtn"></button><button class="purple" onclick="openReview()" id="reviewBtn"></button></div></aside><section class="card stage" id="stage"></section></div></main>

<main id="review" class="screen"><section class="card"><div class="row" style="justify-content:space-between;align-items:center"><h2 id="reviewTitle" style="margin:0"></h2><button class="plain" onclick="showScreen(lastScreen || 'levels')" id="backBtn"></button></div><div id="reviewList" style="margin-top:16px"></div></section></main>
<main id="dictionary" class="screen"><section class="card"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:16px"><h2 id="dictTitle" style="margin:0"></h2><button class="plain" onclick="showScreen('menu')" id="backMenu2"></button></div><div class="dict" id="dictList"></div></section></main>
</div>
<script>
const $=s=>document.querySelector(s);let lang='es';let state={score:0,level:null,i:0,errors:[],stars:{},timeMode:false,timer:null,timeLeft:30,lastScreen:'levels'};
const I={es:{title:'Misión Cuerpo Humano',subtitle:'Science: huesos, músculos y movimiento',points:'puntos',play:'Jugar',dictionary:'Diccionario',time:'Contrarreloj',on:'ON',off:'OFF',menuTitle:'¡Bienvenido a la misión!',menuText:'Aprende el esqueleto y los músculos superando retos cortos. Toca tarjetas, identifica músculos, responde preguntas y gana dibujos.',doctor:'Soy la doctora Huesitos. Te daré pistas si te equivocas.',choose:'Selecciona nivel',backMenu:'← Menú',exit:'Salir',review:'Repasar errores',ready:'Lee bien el reto. Si fallas, te doy una pista.',focus:'¡Concentración, explorador del cuerpo humano!',challenge:'Reto',timeLabel:'Tiempo',done:'¡Nivel completado!',earned:'Dibujitos conseguidos:',other:'Elegir otro nivel',menu:'Menú',back:'Volver',reviewTitle:'Repaso de errores',noErrors:'Todavía no hay errores que repasar. ¡Buen trabajo!',yourAnswer:'Tu respuesta:',hint:'Pista:',quickDict:'Diccionario rápido',tapCard:'1) Toca una tarjeta. 2) Pincha el hueco en el dibujo:',tapHole:'Ahora pincha el hueco donde crees que va.',tapFirst:'Primero toca una tarjeta de hueso.',correct:'✅ ¡Correcto! +10 puntos',advance:'¡Muy bien! Tu misión avanza.',wrong:'❌ Casi. Prueba otra vez.',try:'No pasa nada: los científicos aprenden probando.',placed:'Colocar cada hueso en su sitio',selectMuscle:'Haz clic en el músculo correcto'},en:{title:'Human Body Mission',subtitle:'Science: bones, muscles and movement',points:'points',play:'Play',dictionary:'Dictionary',time:'Timer mode',on:'ON',off:'OFF',menuTitle:'Welcome to the mission!',menuText:'Learn about the skeleton and muscles by completing short challenges. Tap cards, identify muscles, answer questions and win pictures.',doctor:'I am Dr. Bones. I will give you hints if you make a mistake.',choose:'Choose a level',backMenu:'← Menu',exit:'Exit',review:'Review mistakes',ready:'Read the challenge carefully. If you miss it, I will give you a hint.',focus:'Focus, human-body explorer!',challenge:'Challenge',timeLabel:'Time',done:'Level complete!',earned:'Pictures earned:',other:'Choose another level',menu:'Menu',back:'Back',reviewTitle:'Mistake review',noErrors:'There are no mistakes to review yet. Great job!',yourAnswer:'Your answer:',hint:'Hint:',quickDict:'Quick dictionary',tapCard:'1) Tap a card. 2) Tap the blank spot on the drawing:',tapHole:'Now tap the blank spot where you think it goes.',tapFirst:'First tap a bone card.',correct:'✅ Correct! +10 points',advance:'Very good! Your mission moves forward.',wrong:'❌ Almost. Try again.',try:'That is okay: scientists learn by trying.',placed:'Place each bone in the right spot',selectMuscle:'Tap the correct muscle'}};
const D={es:{bones:['Cráneo','Costillas','Columna','Fémur'],muscles:['Bíceps','Tríceps','Abdominales','Cuádriceps'],levels:[['Nivel 1','Huesos fáciles','🦴'],['Nivel 2','Músculos fáciles','💪'],['Nivel 3','Función de músculos y huesos','🧠'],['Nivel 4','Movimientos del cuerpo','🏃'],['Nivel Final','Mezcla de todas las pruebas','🏅']],dict:[['Cráneo','Hueso que protege el cerebro.'],['Costillas','Huesos que forman la caja torácica y protegen corazón y pulmones.'],['Columna','Conjunto de vértebras que sostiene el cuerpo y protege la médula espinal.'],['Fémur','Hueso largo del muslo; ayuda a caminar, correr y saltar.'],['Bíceps','Músculo delantero del brazo; ayuda a doblar el codo.'],['Tríceps','Músculo trasero del brazo; ayuda a estirar el codo.'],['Abdominales','Músculos del tronco que ayudan a mantener postura y mover el cuerpo.'],['Cuádriceps','Músculos delanteros del muslo; ayudan a correr, saltar y levantarse.']]},en:{bones:['Skull','Ribs','Spine','Femur'],muscles:['Biceps','Triceps','Abdominals','Quadriceps'],levels:[['Level 1','Easy bones','🦴'],['Level 2','Easy muscles','💪'],['Level 3','What bones and muscles do','🧠'],['Level 4','Body movements','🏃'],['Final Level','Mix of all challenges','🏅']],dict:[['Skull','Bone that protects the brain.'],['Ribs','Bones that form the rib cage and protect the heart and lungs.'],['Spine','A set of vertebrae that supports the body and protects the spinal cord.'],['Femur','Long bone in the thigh; it helps us walk, run and jump.'],['Biceps','Front arm muscle; it helps bend the elbow.'],['Triceps','Back arm muscle; it helps straighten the elbow.'],['Abdominals','Trunk muscles that help posture and body movement.'],['Quadriceps','Front thigh muscles; they help us run, jump and stand up.']]}};
function buildLevels(){const d=D[lang],b=d.bones,m=d.muscles;return[{id:'bones',title:d.levels[0][0],desc:d.levels[0][1],badge:d.levels[0][2],kind:'drag',tasks:[{q:lang==='es'?'Coloca estos huesos en el esqueleto incompleto.':'Place these bones on the incomplete skeleton.',items:b,hint:lang==='es'?'Mira la forma: el cráneo va arriba, el fémur en la pierna.':'Look at the shape: the skull goes at the top, the femur in the leg.'}]},{id:'muscles',title:d.levels[1][0],desc:d.levels[1][1],badge:d.levels[1][2],kind:'muscle',tasks:[{q:lang==='es'?'Selecciona el bíceps.':'Select the biceps.',answer:m[0],hint:lang==='es'?'Está en la parte delantera del brazo.':'It is on the front of the arm.'},{q:lang==='es'?'Selecciona los abdominales.':'Select the abdominals.',answer:m[2],hint:lang==='es'?'Están en el centro del tronco.':'They are in the middle of the trunk.'},{q:lang==='es'?'Selecciona el cuádriceps.':'Select the quadriceps.',answer:m[3],hint:lang==='es'?'Está en la parte delantera del muslo.':'It is on the front of the thigh.'},{q:lang==='es'?'Selecciona el tríceps.':'Select the triceps.',answer:m[1],hint:lang==='es'?'Está en la parte trasera del brazo.':'It is on the back of the arm.'}]},{id:'functions',title:d.levels[2][0],desc:d.levels[2][1],badge:d.levels[2][2],kind:'quiz',tasks:lang==='es'?[{q:'¿Para qué sirven principalmente los huesos?',opts:['Proteger órganos y sostener el cuerpo','Respirar aire','Digerir comida'],answer:'Proteger órganos y sostener el cuerpo',hint:'Piensa en las costillas protegiendo pulmones y corazón.'},{q:'¿Qué hacen los músculos?',opts:['Ayudan al movimiento','Fabrican sangre siempre','Son dientes pequeños'],answer:'Ayudan al movimiento',hint:'Se contraen y relajan para mover partes del cuerpo.'},{q:'¿Qué protege el cráneo?',opts:['El cerebro','El estómago','Los pies'],answer:'El cerebro',hint:'El cráneo es como un casco natural.'},{q:'¿Qué hueso largo está en el muslo?',opts:['Fémur','Cráneo','Costilla'],answer:'Fémur',hint:'Es uno de los huesos más fuertes del cuerpo.'}]:[{q:'What are bones mainly for?',opts:['Protecting organs and supporting the body','Breathing air','Digesting food'],answer:'Protecting organs and supporting the body',hint:'Think about the ribs protecting the lungs and heart.'},{q:'What do muscles do?',opts:['They help movement','They always make blood','They are small teeth'],answer:'They help movement',hint:'They contract and relax to move body parts.'},{q:'What does the skull protect?',opts:['The brain','The stomach','The feet'],answer:'The brain',hint:'The skull is like a natural helmet.'},{q:'Which long bone is in the thigh?',opts:['Femur','Skull','Rib'],answer:'Femur',hint:'It is one of the strongest bones in the body.'}]},{id:'movement',title:d.levels[3][0],desc:d.levels[3][1],badge:d.levels[3][2],kind:'quiz',tasks:lang==='es'?[{q:'¿Qué músculos ayudan mucho al saltar?',opts:['Cuádriceps y gemelos','Bíceps y mandíbula','Abdominales solamente'],answer:'Cuádriceps y gemelos',hint:'Para saltar usamos sobre todo las piernas.'},{q:'Para doblar el brazo usamos principalmente...',opts:['Bíceps','Cuádriceps','Costillas'],answer:'Bíceps',hint:'El bíceps flexiona el codo.'},{q:'Al levantar un brazo participan...',opts:['Músculos del hombro y huesos del brazo','Solo los dedos','El fémur'],answer:'Músculos del hombro y huesos del brazo',hint:'El hombro inicia gran parte del movimiento.'},{q:'Al correr trabajan especialmente...',opts:['Piernas, cadera y tronco','Solo los ojos','Solo el cráneo'],answer:'Piernas, cadera y tronco',hint:'Correr coordina muchas partes del cuerpo.'}]:[{q:'Which muscles help a lot when jumping?',opts:['Quadriceps and calves','Biceps and jaw','Only abdominals'],answer:'Quadriceps and calves',hint:'To jump, we mainly use our legs.'},{q:'To bend the arm, we mainly use...',opts:['Biceps','Quadriceps','Ribs'],answer:'Biceps',hint:'The biceps bends the elbow.'},{q:'When lifting an arm, we use...',opts:['Shoulder muscles and arm bones','Only the fingers','The femur'],answer:'Shoulder muscles and arm bones',hint:'The shoulder starts much of the movement.'},{q:'When running, these work especially...',opts:['Legs, hips and trunk','Only the eyes','Only the skull'],answer:'Legs, hips and trunk',hint:'Running coordinates many body parts.'}]},{id:'final',title:d.levels[4][0],desc:d.levels[4][1],badge:d.levels[4][2],kind:'mixed',tasks:lang==='es'?[{type:'quiz',q:'¿Qué músculo usamos para doblar el brazo?',opts:['Bíceps','Tríceps','Abdominales'],answer:'Bíceps',hint:'Está delante del brazo.'},{type:'muscle',q:'Selecciona los abdominales.',answer:'Abdominales',hint:'Zona central del cuerpo.'},{type:'quiz',q:'¿Qué protegen las costillas?',opts:['Corazón y pulmones','Rodillas','Dedos'],answer:'Corazón y pulmones',hint:'Forman la caja torácica.'},{type:'drag',q:'Reto final: coloca los huesos.',items:b,hint:'Arriba, pecho, espalda y muslo.'}]:[{type:'quiz',q:'Which muscle do we use to bend the arm?',opts:['Biceps','Triceps','Abdominals'],answer:'Biceps',hint:'It is at the front of the arm.'},{type:'muscle',q:'Select the abdominals.',answer:'Abdominals',hint:'Middle area of the body.'},{type:'quiz',q:'What do the ribs protect?',opts:['Heart and lungs','Knees','Fingers'],answer:'Heart and lungs',hint:'They form the rib cage.'},{type:'drag',q:'Final challenge: place the bones.',items:b,hint:'Top, chest, back and thigh.'}]}];}
let levels=buildLevels();function setLang(l){lang=l;document.documentElement.lang=l;levels=buildLevels();state.level=null;state.i=0;state.errors=[];applyText();showScreen('menu')}function T(k){return I[lang][k]||k}
function applyText(){$('#title').textContent=T('title');$('#subtitle').textContent=T('subtitle');$('#menuTitle').textContent=T('menuTitle');$('#menuText').textContent=T('menuText');$('#playBtn').textContent=T('play');$('#dictBtn').textContent=T('dictionary');$('#doctorText').textContent=T('doctor');$('#chooseLevel').textContent=T('choose');$('#backMenu1').textContent=T('backMenu');$('#backMenu2').textContent=T('backMenu');$('#exitBtn').textContent=T('exit');$('#reviewBtn').textContent=T('review');$('#reviewBtn2').textContent=T('review');$('#resultTitle').textContent=T('done');$('#resultText').textContent=T('earned');$('#otherLevelBtn').textContent=T('other');$('#menuBtn2').textContent=T('menu');$('#reviewTitle').textContent=T('reviewTitle');$('#backBtn').textContent=T('back');$('#dictTitle').textContent=T('quickDict');$('#timeLabel').textContent=T('timeLabel');$('#timeBtn').textContent='⏱️ '+T('time')+': '+(state.timeMode?T('on'):T('off'));renderTop();renderLevels();renderDict()}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$('#'+id).classList.add('active');if(id!=='review')state.lastScreen=id;stopTimer();renderTop()}function renderTop(){$('#totalScore').textContent='⭐ '+state.score+' '+T('points')}function renderLevels(){$('#levelList').innerHTML=levels.map(l=>`<div class="level" onclick="startLevel('${l.id}')"><div class="badge">${l.badge}</div><h3>${l.title}</h3><p>${l.desc}</p><div class="stars">${'★'.repeat(state.stars[lang+'-'+l.id]||0)}${'☆'.repeat(3-(state.stars[lang+'-'+l.id]||0))}</div></div>`).join('')}function renderDict(){$('#dictList').innerHTML=D[lang].dict.map(([a,b])=>`<article><h4>${a}</h4><p>${b}</p></article>`).join('')}function toggleTimeMode(){state.timeMode=!state.timeMode;applyText()}function startLevel(id){state.level=levels.find(l=>l.id===id);state.i=0;$('#guideText').textContent=T('focus');showScreen('game');renderTask()}function currentTask(){return state.level.tasks[state.i]}function taskKind(t=currentTask()){return t.type||state.level.kind}
function renderTask(){stopTimer();const l=state.level,t=currentTask();$('#levelName').textContent=l.title;$('#score').textContent='⭐ '+state.score;$('#step').textContent=T('challenge')+' '+(state.i+1)+'/'+l.tasks.length;$('#feedback').textContent='';$('#hint').textContent='';$('#guideText').textContent=T('ready');const k=taskKind(t);if(k==='drag')renderDrag(t);if(k==='muscle')renderMuscle(t);if(k==='quiz')renderQuiz(t);if(state.timeMode)startTimer()}function renderQuiz(t){const opts=[t.answer,...t.opts.filter(o=>o!==t.answer)];$('#stage').innerHTML=`<h2 class="question">${t.q}</h2><div class="options">${opts.map(o=>`<button class="option" onclick="answerQuiz(this,'${esc(o)}')">${o}</button>`).join('')}</div>`}function answerQuiz(btn,val){const t=currentTask(),ok=val===t.answer;btn.classList.add(ok?'correct':'wrong');ok?success():fail(t)}
function renderMuscle(t){const m=D[lang].muscles;$('#stage').innerHTML=`<h2 class="question">${t.q}</h2><div class="muscleMap"><svg class="bodySvg" viewBox="0 0 280 420"><circle cx="140" cy="45" r="28" fill="#ffd7b5"/><rect x="112" y="75" width="56" height="115" rx="26" fill="#ffd7b5"/><ellipse class="hotspot" onclick="answerMuscle('${esc(m[0])}')" cx="86" cy="128" rx="19" ry="49" fill="#ff8b61"/><ellipse class="hotspot" onclick="answerMuscle('${esc(m[1])}')" cx="194" cy="128" rx="19" ry="49" fill="#f25f5c"/><rect class="hotspot" onclick="answerMuscle('${esc(m[2])}')" x="118" y="112" width="44" height="76" rx="16" fill="#f7b267"/><ellipse class="hotspot" onclick="answerMuscle('${esc(m[3])}')" cx="115" cy="255" rx="25" ry="70" fill="#73d2de"/><ellipse class="hotspot" onclick="answerMuscle('${esc(m[3])}')" cx="165" cy="255" rx="25" ry="70" fill="#73d2de"/><rect x="100" y="325" width="30" height="74" rx="15" fill="#ffd7b5"/><rect x="150" y="325" width="30" height="74" rx="15" fill="#ffd7b5"/><text x="140" y="410" text-anchor="middle" font-weight="900">${T('selectMuscle')}</text></svg><div class="legend"><div style="border-left:14px solid #ff8b61">${m[0]}</div><div style="border-left:14px solid #f25f5c">${m[1]}</div><div style="border-left:14px solid #f7b267">${m[2]}</div><div style="border-left:14px solid #73d2de">${m[3]}</div></div></div>`}function answerMuscle(name){const t=currentTask();name===t.answer?success():fail(t)}
function renderDrag(t){const b=D[lang].bones;$('#stage').innerHTML=`<h2 class="question">${t.q}</h2><div class="bodyWrap"><svg class="bodySvg" viewBox="0 0 320 470"><g class="dropZone" data-accept="${b[0]}"><circle class="drop" cx="160" cy="48" r="32"/><text class="targetLabel" x="160" y="54" text-anchor="middle">?</text></g><g class="dropZone" data-accept="${b[1]}"><rect class="drop" x="111" y="98" width="98" height="76" rx="28"/><text class="targetLabel" x="160" y="143" text-anchor="middle">?</text></g><g class="dropZone" data-accept="${b[2]}"><rect class="drop" x="147" y="80" width="26" height="150" rx="13"/><text class="targetLabel" x="160" y="214" text-anchor="middle">?</text></g><g class="dropZone" data-accept="${b[3]}"><rect class="drop" x="122" y="235" width="34" height="135" rx="17"/><rect class="drop" x="164" y="235" width="34" height="135" rx="17"/><text class="targetLabel" x="160" y="310" text-anchor="middle">?</text></g></svg><div class="dragPanel"><div class="small">${T('tapCard')}</div>${t.items.map(i=>`<div class="dragItem" data-item="${i}">${i}</div>`).join('')}</div></div>`;setupDnD()}function setupDnD(){let selected=null;document.querySelectorAll('.dragItem').forEach(el=>el.addEventListener('click',()=>{if(el.classList.contains('used'))return;selected=el.dataset.item;document.querySelectorAll('.dragItem').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');$('#hint').textContent=T('tapHole')}));document.querySelectorAll('.dropZone').forEach(z=>z.addEventListener('click',()=>{if(z.classList.contains('done'))return;if(!selected){$('#hint').textContent=T('tapFirst');return}const item=selected;if(item===z.dataset.accept){z.querySelector('text').textContent='✅';z.classList.add('done');const card=document.querySelector(`.dragItem[data-item="${item}"]`);card?.classList.add('used');card?.classList.remove('selected');selected=null;$('#hint').textContent='';if(document.querySelectorAll('.dropZone.done').length===4)success()}else fail(currentTask())}))}
function success(){stopTimer();state.score+=10;$('#score').textContent='⭐ '+state.score;$('#feedback').textContent=T('correct');$('#feedback').className='feedback ok';$('#guideText').textContent=T('advance');beep(650,.12);setTimeout(nextTask,800)}function fail(t){$('#feedback').textContent=T('wrong');$('#feedback').className='feedback bad';$('#hint').textContent=T('hint')+' '+t.hint;$('#guideText').textContent=T('try');beep(180,.18);if(!state.errors.some(e=>e.q===t.q))state.errors.push({q:t.q,answer:t.answer||T('placed'),hint:t.hint})}function nextTask(){state.i<state.level.tasks.length-1?(state.i++,renderTask()):finishLevel()}function finishLevel(){stopTimer();const stars=state.errors.length===0?3:state.errors.length<=2?2:1;state.stars[lang+'-'+state.level.id]=Math.max(state.stars[lang+'-'+state.level.id]||0,stars);renderLevels();$('#resultTitle').textContent=T('done');$('#resultText').textContent=T('earned');$('#stickers').innerHTML=['🦴','💪','🧠'].slice(0,stars).map(s=>`<div class="sticker">${s}</div>`).join('');showScreen('results')}function openReview(){const list=$('#reviewList');list.innerHTML=!state.errors.length?`<p style="font-size:20px">${T('noErrors')}</p>`:state.errors.map(e=>`<article class="level"><h3>${e.q}</h3><p><b>${T('yourAnswer')}</b> ________________________</p><p><b>${T('hint')}</b> ${e.hint}</p><p style="font-size:38px;margin:8px 0">✏️ 🦴 💪</p></article>`).join('');showScreen('review')}function startTimer(){let total=30;state.timeLeft=total;$('#timerBox').classList.remove('hidden');$('#timerBar').style.width='100%';state.timer=setInterval(()=>{state.timeLeft-=.2;$('#timerBar').style.width=Math.max(0,state.timeLeft/total*100)+'%';if(state.timeLeft<=0){stopTimer();fail(currentTask());setTimeout(nextTask,900)}},200)}function stopTimer(){if(state.timer){clearInterval(state.timer);state.timer=null}$('#timerBox')?.classList.add('hidden')}function beep(freq,dur){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=freq;o.connect(g);g.connect(ctx.destination);g.gain.value=.08;o.start();setTimeout(()=>{o.stop();ctx.close()},dur*1000)}catch(e){}}function esc(s){return String(s).replaceAll("'","\\'")}applyText();showScreen('language');
</script></body></html>
